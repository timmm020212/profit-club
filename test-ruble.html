<!DOCTYPE html>
<html>
<head>
    <title>Тест знаков рубля</title>
    <style>
        body {
            background-color: #f0f0f0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .symbol {
            font-size: 24px;
            margin: 10px;
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Тест знаков рубля</h1>
    
    <div class="symbol">₽ (U+20BD - официальный знак рубля)</div>
    <div class="symbol">₽ (тот же символ)</div>
    <div class="symbol">руб (текст)</div>
    <div class="symbol">₽ (проверка)</div>
    
    <h2>Unicode коды:</h2>
    <div>&amp;#8381; = ₽</div>
    <div>&amp;#x20BD; = ₽</div>
    
    <h2>Проверка шрифтов:</h2>
    <div style="font-family: Arial;">₽ Arial</div>
    <div style="font-family: Times New Roman;">₽ Times</div>
    <div style="font-family: Calibri;">₽ Calibri</div>
    <div style="font-family: Verdana;">₽ Verdana</div>
    
    <script>
        console.log('Символ рубля:', '₽');
        console.log('CharCode:', '₽'.charCodeAt(0));
        console.log('Unicode:', '₽'.codePointAt(0));
    </script>
</body>
</html>
